# ============================================================
#  ClinicAI SaaS — Docker Compose de Produção
#  Oracle Cloud Free Tier (ARM Ampere A1 — 4 OCPU / 24 GB RAM)
#
#  Serviços:
#    postgres        → PostgreSQL 16
#    redis           → Redis 7 (sessões WA + cache)
#    api             → Backend Node.js (Express 5)
#    dashboard       → Frontend compilado servido pelo Nginx
#    evolution       → Evolution API (WhatsApp)
#    nginx           → Reverse proxy + TLS termination
#
#  Antes de subir:
#    cp .env.prod.example .env.prod
#    # edite .env.prod com suas chaves reais
#    docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinicai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinicai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_sas}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinicai} -d ${POSTGRES_DB:-clinic_sas}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Não expõe porta para o host — acesso apenas interno
    expose:
      - "5432"

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinicai-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Backend (Node.js) ─────────────────────────────────────
  api:
    image: clinicai-api:latest
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
      args:
        NODE_VERSION: "22"
    container_name: clinicai-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      PORT: "3000"
      NODE_ENV: production
    networks:
      - backend
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Dashboard (Frontend Nginx) ────────────────────────────────
  dashboard:
    image: clinicai-dashboard:latest
    build:
      context: .
      dockerfile: deploy/Dockerfile.dashboard
      args:
        VITE_API_URL: ""      # deixa em branco — usa proxy relativo /api
    container_name: clinicai-dashboard
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - "80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ | grep -q '<html'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Evolution API (WhatsApp) ──────────────────────────────────
  evolution:
    image: evolution-api-custom:latest
    build:
      context: .
      dockerfile: Dockerfile.evolution
    container_name: clinicai-evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    sysctls:
      net.ipv4.tcp_keepalive_time: 30
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 5
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - backend
      - frontend
    expose:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      # Em produção, usar o domínio público real
      SERVER_URL: "https://${DOMAIN}/evolution"
      LOG_LEVEL: "ERROR,WARN,INFO"
      LOG_COLOR: "false"
      LOG_BAILEYS: "warn"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-clinicai}:${POSTGRES_PASSWORD}@postgres:5432/evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_clinicsas"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://:${REDIS_PASSWORD}@redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evo"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: "ClinicAI SaaS"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
      WA_VERSION: "2,3000,1035194821"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q 'Evolution'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Nginx (Reverse Proxy + TLS) ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clinicai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - api
      - dashboard
      - evolution
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (Let's Encrypt) ───────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: clinicai-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renova automaticamente a cada 12h (Certbot já só renova se faltar < 30 dias)
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 43200 & wait $${!};
             done"

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  certbot_www:
  certbot_certs:
