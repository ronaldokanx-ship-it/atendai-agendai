# ─────────────────────────────────────────────────────────────
#  deploy/nginx/conf.d/vm1.conf
#  Oracle Cloud VM1 — Backend API
#  api.kanxitsolutions.com.br
# ─────────────────────────────────────────────────────────────

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.kanxitsolutions.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — API Backend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.kanxitsolutions.com.br;

    ssl_certificate     /etc/letsencrypt/live/api.kanxitsolutions.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kanxitsolutions.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.kanxitsolutions.com.br/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Rate limiting: 30 req/s com burst de 100
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    location /api/ {
        limit_req zone=api burst=100 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # Health check público (sem rate limit)
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # Bloqueia acesso direto a qualquer outra rota
    location / {
        return 404;
    }
}


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

