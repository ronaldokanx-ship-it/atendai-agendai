# ─────────────────────────────────────────────────────────────
#  dashboard.conf — Nginx interno do container do dashboard
#  Serve os estáticos do React SPA (history API fallback)
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache agressivo para estáticos hasheados (ex: main.abc123.js)
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html sem cache (permite deploy sem invalidação do CDN)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: qualquer rota não encontrada → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Remove access log para estáticos (reduz ruído)
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Healthcheck interno
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
