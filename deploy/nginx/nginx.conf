# ─────────────────────────────────────────────────────────────
#  nginx.conf — Configuração global do Nginx
#  Produção: Oracle Cloud ARM (Ubuntu 22.04)
# ─────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;          # auto = 1 worker por vCPU

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logs ────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    # ── Compressão Gzip ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ── Segurança ────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ── Rate limiting ────────────────────────────────────────────
    # Zona para API — 30 req/s por IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Zona para webhook WhatsApp — sem rate limit agressivo (Evolution envia em burst)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/s;
    # Zona para login — 5 req/min por IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Inclui vhosts
    include /etc/nginx/conf.d/*.conf;
}
