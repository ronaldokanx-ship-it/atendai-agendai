openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ClinicAI SaaS multi-tenant WhatsApp automation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clinics
    description: Clinic management
  - name: services
    description: Services offered by a clinic
  - name: appointments
    description: Appointment management
  - name: ai-logs
    description: AI interaction logs
  - name: whatsapp
    description: WhatsApp webhook
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clinics:
    get:
      operationId: listClinics
      tags: [clinics]
      summary: List all clinics
      responses:
        "200":
          description: List of clinics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"
    post:
      operationId: createClinic
      tags: [clinics]
      summary: Create a clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClinicBody"
      responses:
        "201":
          description: Created clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{id}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get a clinic by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClinic
      tags: [clinics]
      summary: Update clinic AI settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClinicBody"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinics/{clinicId}/services:
    get:
      operationId: listServices
      tags: [services]
      summary: List services for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /clinics/{clinicId}/services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, canceled]
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/ai-logs:
    get:
      operationId: listAiLogs
      tags: [ai-logs]
      summary: List AI interaction logs for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of AI logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiLog"

  /whatsapp/webhook:
    post:
      operationId: whatsappWebhook
      tags: [whatsapp]
      summary: Receive WhatsApp messages and process with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappWebhookBody"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappWebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Clinic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        apiKey:
          type: string
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, phone, apiKey, aiName, aiPersonalityPrompt, knowledgeBase, clinicType, createdAt, updatedAt]

    CreateClinicBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
      required: [name, phone, clinicType, aiName, aiPersonalityPrompt, knowledgeBase]

    UpdateClinicBody:
      type: object
      properties:
        name:
          type: string
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]

    Service:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, name, price, durationMinutes, createdAt]

    CreateServiceBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
      required: [name, price, durationMinutes]

    UpdateServiceBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer

    Appointment:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        serviceId:
          type: ["integer", "null"]
        patientName:
          type: string
        patientPhone:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, confirmed, canceled]
        paymentIntentId:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, patientName, patientPhone, scheduledAt, status, createdAt]

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, canceled]
        notes:
          type: string

    AiLog:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        patientPhone:
          type: string
        userMessage:
          type: string
        aiResponse:
          type: string
        tokensUsed:
          type: integer
        messageType:
          type: string
          enum: [text, audio]
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, patientPhone, userMessage, aiResponse, tokensUsed, messageType, createdAt]

    WhatsappWebhookBody:
      type: object
      properties:
        apiKey:
          type: string
        from:
          type: string
        message:
          type: string
        audioUrl:
          type: ["string", "null"]
        messageType:
          type: string
          enum: [text, audio]
      required: [apiKey, from, message, messageType]

    WhatsappWebhookResponse:
      type: object
      properties:
        reply:
          type: string
        appointmentId:
          type: ["integer", "null"]
      required: [reply]
