openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ClinicAI SaaS multi-tenant WhatsApp automation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clinics
    description: Clinic management
  - name: services
    description: Services offered by a clinic
  - name: professionals
    description: Professionals and their specialties
  - name: patients
    description: Patient/client management
  - name: appointments
    description: Appointment management
  - name: ai-logs
    description: AI interaction logs
  - name: whatsapp
    description: WhatsApp webhook
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clinics:
    get:
      operationId: listClinics
      tags: [clinics]
      summary: List all clinics
      responses:
        "200":
          description: List of clinics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"
    post:
      operationId: createClinic
      tags: [clinics]
      summary: Create a clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClinicBody"
      responses:
        "201":
          description: Created clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{id}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get a clinic by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClinic
      tags: [clinics]
      summary: Update clinic AI settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClinicBody"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinics/{clinicId}/services:
    get:
      operationId: listServices
      tags: [services]
      summary: List services for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /clinics/{clinicId}/services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/professionals:
    get:
      operationId: listProfessionals
      tags: [professionals]
      summary: List professionals for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: serviceId
          in: query
          required: false
          schema:
            type: integer
          description: Filter professionals who can perform this service
      responses:
        "200":
          description: List of professionals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Professional"
    post:
      operationId: createProfessional
      tags: [professionals]
      summary: Create a professional
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfessionalBody"
      responses:
        "201":
          description: Created professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professional"

  /clinics/{clinicId}/professionals/{id}:
    get:
      operationId: getProfessional
      tags: [professionals]
      summary: Get a professional with their service links
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Professional detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalDetail"
    patch:
      operationId: updateProfessional
      tags: [professionals]
      summary: Update a professional
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfessionalBody"
      responses:
        "200":
          description: Updated professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Professional"
    delete:
      operationId: deleteProfessional
      tags: [professionals]
      summary: Delete a professional
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/professionals/{id}/services:
    put:
      operationId: setProfessionalServices
      tags: [professionals]
      summary: Set the services a professional can perform (replaces existing)
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProfessionalServicesBody"
      responses:
        "200":
          description: Updated service list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalDetail"

  /clinics/{clinicId}/patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name or phone
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a patient
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /clinics/{clinicId}/patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient with appointment history
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient info or notes
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, canceled]
        - name: professionalId
          in: query
          required: false
          schema:
            type: integer
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/ai-logs:
    get:
      operationId: listAiLogs
      tags: [ai-logs]
      summary: List AI interaction logs for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of AI logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiLog"

  /whatsapp/webhook:
    post:
      operationId: whatsappWebhook
      tags: [whatsapp]
      summary: Receive WhatsApp messages and process with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappWebhookBody"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappWebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Clinic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        apiKey:
          type: string
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, phone, apiKey, aiName, aiPersonalityPrompt, knowledgeBase, clinicType, createdAt, updatedAt]

    CreateClinicBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
      required: [name, phone, clinicType, aiName, aiPersonalityPrompt, knowledgeBase]

    UpdateClinicBody:
      type: object
      properties:
        name:
          type: string
        aiName:
          type: string
        aiPersonalityPrompt:
          type: string
        knowledgeBase:
          type: string
        clinicType:
          type: string
          enum: [medical, vet, dental]

    Service:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, name, price, durationMinutes, createdAt]

    CreateServiceBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
      required: [name, price, durationMinutes]

    UpdateServiceBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer

    Professional:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        specialty:
          type: string
        bio:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, clinicId, name, specialty, active, createdAt, updatedAt]

    ProfessionalDetail:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        specialty:
          type: string
        bio:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        serviceIds:
          type: array
          items:
            type: integer
      required: [id, clinicId, name, specialty, active, createdAt, updatedAt, serviceIds]

    CreateProfessionalBody:
      type: object
      properties:
        name:
          type: string
        specialty:
          type: string
        bio:
          type: string
        active:
          type: boolean
        serviceIds:
          type: array
          items:
            type: integer
      required: [name, specialty]

    UpdateProfessionalBody:
      type: object
      properties:
        name:
          type: string
        specialty:
          type: string
        bio:
          type: string
        active:
          type: boolean

    SetProfessionalServicesBody:
      type: object
      properties:
        serviceIds:
          type: array
          items:
            type: integer
      required: [serviceIds]

    Patient:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, clinicId, name, phone, createdAt, updatedAt]

    PatientDetail:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        aiLogs:
          type: array
          items:
            $ref: "#/components/schemas/AiLog"
      required: [id, clinicId, name, phone, createdAt, updatedAt, appointments, aiLogs]

    CreatePatientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        dateOfBirth:
          type: string
        notes:
          type: string
      required: [name, phone]

    UpdatePatientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        dateOfBirth:
          type: string
        notes:
          type: string

    Appointment:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        serviceId:
          type: ["integer", "null"]
        professionalId:
          type: ["integer", "null"]
        patientId:
          type: ["integer", "null"]
        patientName:
          type: string
        patientPhone:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, confirmed, canceled]
        paymentIntentId:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, patientName, patientPhone, scheduledAt, status, createdAt]

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, canceled]
        notes:
          type: string
        professionalId:
          type: integer

    AiLog:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        patientPhone:
          type: string
        userMessage:
          type: string
        aiResponse:
          type: string
        tokensUsed:
          type: integer
        messageType:
          type: string
          enum: [text, audio]
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, patientPhone, userMessage, aiResponse, tokensUsed, messageType, createdAt]

    WhatsappWebhookBody:
      type: object
      properties:
        apiKey:
          type: string
        from:
          type: string
        message:
          type: string
        audioUrl:
          type: ["string", "null"]
        messageType:
          type: string
          enum: [text, audio]
      required: [apiKey, from, message, messageType]

    WhatsappWebhookResponse:
      type: object
      properties:
        reply:
          type: string
        appointmentId:
          type: ["integer", "null"]
      required: [reply]
