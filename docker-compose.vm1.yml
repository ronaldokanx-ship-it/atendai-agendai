# ============================================================
#  ClinicAI SaaS — VM1: Backend API
#  Oracle Cloud Free Tier — VM.Standard.E2.1.Micro (x86)
#  1 OCPU / 1 GB RAM — Ubuntu 22.04
#
#  Database: Neon (externo, via DATABASE_URL com SSL)
#  Frontend: Vercel (externo)
#  Evolution API: VM2 (externo, via EVOLUTION_API_URL)
#
#  Uso:
#    cp .env.prod.example .env.prod  # edite com suas chaves
#    docker compose -f docker-compose.vm1.yml up -d
# ============================================================

services:

  # ── API Backend (Node.js) ─────────────────────────────────────
  api:
    image: clinicai-api:latest
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    container_name: clinicai-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      PORT: "3000"
      NODE_ENV: production
    networks:
      - clinicai
    ports:
      - "127.0.0.1:3000:3000"   # Apenas localhost — Nginx faz a exposição externa
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 700M    # Deixa margem no 1 GB da VM

  # ── Nginx (Reverse Proxy + TLS via Certbot) ───────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: clinicai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/vm1.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - clinicai
    depends_on:
      api:
        condition: service_healthy

volumes:
  certbot_www:
  certbot_certs:
    external: true

networks:
  clinicai:
    driver: bridge
