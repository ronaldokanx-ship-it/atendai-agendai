# ============================================================
#  ClinicAI SaaS — VM2: Evolution API (WhatsApp)
#  Oracle Cloud Free Tier — VM.Standard.E2.1.Micro (x86)
#  1 OCPU / 1 GB RAM — Ubuntu 22.04
#
#  Database: Neon (externo, via EVOLUTION_DB_URL com SSL)
#  Redis: local (apenas sessões WhatsApp, não precisa persistir dados de negócio)
#  Backend webhook: VM1 (via EVOLUTION_WEBHOOK_URL)
#
#  Uso:
#    cp .env.prod.example .env.evolution
#    docker compose -f docker-compose.vm2.yml up -d
# ============================================================

services:

  # ── Redis (sessões Evolution API) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinicai-redis
    restart: unless-stopped
    env_file: .env.prod
    command: >-
      sh -c "redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass $$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    networks:
      - evolution
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── Evolution API (WhatsApp) ──────────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: clinicai-evolution
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    sysctls:
      net.ipv4.tcp_keepalive_time: 30
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 5
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution
    ports:
      - "127.0.0.1:8080:8080"    # Apenas localhost — Nginx expõe externamente
    environment:
      SERVER_PORT: "8080"
      SERVER_URL: "${EVOLUTION_PUBLIC_URL}"
      LOG_LEVEL: "ERROR,WARN,INFO"
      LOG_COLOR: "false"
      LOG_BAILEYS: "warn"
      # Database: Neon via SSL
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "${EVOLUTION_DB_URL}"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_clinicsas"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      # Redis local
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://:${REDIS_PASSWORD}@redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evo"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      # Auth
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Webhook para VM1
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: "ClinicAI SaaS"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q 'Evolution' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 600M

  # ── Nginx (Reverse Proxy + TLS) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: evolution-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/vm2.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - evolution
    depends_on:
      evolution:
        condition: service_healthy

volumes:
  redis_data:
  evolution_instances:
  certbot_www:
  certbot_certs:

networks:
  evolution:
    driver: bridge
